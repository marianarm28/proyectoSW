<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - Operación de Mantenimiento</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            background-color: #7f8c8d;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-nav {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-full {
            grid-column: 1 / -1;
        }
        h3 {
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-blue { background-color: #2980b9; }
        .btn-blue:hover { background-color: #2471a3; }
        .btn-orange { background-color: #d35400; }
        .btn-orange:hover { background-color: #ba4a00; }
        
        .alert-item {
            background-color: #fadbd8;
            border-left: 5px solid #e74c3c;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alert-title {
            font-weight: bold;
            color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Módulo de Mantenimiento</h1>
            <p>Sprint 1 - Operaciones, Asignaciones e Informes Técnicos</p>
        </div>
        <a href="/inventario" class="btn-nav">Volver al Inventario</a>
    </header>

    <div class="card card-full" style="margin-bottom: 20px;">
        <h3>⚠️ Alertas Preventivas por Tiempo</h3>
        <div id="contenedorAlertas">
            </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Asignar Técnico Responsable</h3>
            <form id="asignarForm">
                <div class="form-group">
                    <label for="activo_id_asig">ID del Activo en Alerta</label>
                    <input type="number" id="activo_id_asig" required placeholder="Ej: 1">
                </div>
                <div class="form-group">
                    <label for="tecnico_id">Técnico Responsable</label>
                    <select id="tecnico_id" required>
                        <option value="2">tecnico_a (Técnico de Planta)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-blue">Confirmar Asignación</button>
            </form>
        </div>

        <div class="card">
            <h3>Registrar Informe Técnico</h3>
            <form id="informeForm">
                <div class="form-group">
                    <label for="activo_id_inf">ID del Activo Intervenido</label>
                    <input type="number" id="activo_id_inf" required placeholder="Ej: 1">
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción de la Intervención</label>
                    <textarea id="descripcion" required placeholder="Describa los cambios de repuestos, reparaciones o actividades ejecutadas..."></textarea>
                </div>
                <button type="submit" class="btn btn-orange">Guardar y Cerrar Orden</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Carga las alertas consumiendo el endpoint de la historia SCRUM-8
    async function cargarAlertas() {
        try {
            const response = await fetch('/api/mantenimiento/alertas');
            const data = await response.json();
            const contenedor = document.getElementById('contenedorAlertas');
            contenedor.innerHTML = '';

            if (response.ok) {
                if (data.alertas.length === 0) {
                    contenedor.innerHTML = '<p style="color: #27ae60; font-weight: bold;">✅ Todos los equipos están al día con sus mantenimientos.</p>';
                    return;
                }

                data.alertas.forEach(alerta => {
                    contenedor.innerHTML += `
                        <div class="alert-item">
                            <div>
                                <span class="alert-title">[ID: ${alerta.id}] ${alerta.nombre}</span> <br>
                                <small>Categoría: ${alerta.categoria} | Estado Actual: <strong>${alerta.estado}</strong></small>
                            </div>
                            <div style="text-align: right;">
                                <span style="color: #c0392b; font-weight: bold;">Requiere Atención</span> <br>
                                <small>Último: Hace ${alerta.dias_transcurridos} días (Límite: ${alerta.limite_dias})</small>
                            </div>
                        </div>
                    `;
                });
            }
        } catch (error) {
            console.error("Error al cargar alertas:", error);
        }
    }

    // Envío de asignación de técnico (SCRUM-12)
    document.getElementById('asignarForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const activo_id = document.getElementById('activo_id_asig').value;
        const tecnico_id = document.getElementById('tecnico_id').value;

        try {
            const response = await fetch('/api/mantenimiento/asignar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ activo_id: parseInt(activo_id), tecnico_id: parseInt(tecnico_id) })
            });
            const data = await response.json();
            alert(data.message);
            if (response.ok) {
                document.getElementById('asignarForm').reset();
                cargarAlertas();
            }
        } catch (error) {
            alert("Error de comunicación.");
        }
    });

    // Envío del informe técnico de cierre (SCRUM-13)
    document.getElementById('informeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const activo_id = document.getElementById('activo_id_inf').value;
        const descripcion = document.getElementById('descripcion').value;

        try {
            const response = await fetch('/api/mantenimiento/informe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ activo_id: parseInt(activo_id), descripcion })
            });
            const data = await response.json();
            alert(data.message);
            if (response.ok) {
                document.getElementById('informeForm').reset();
                cargarAlertas();
            }
        } catch (error) {
            alert("Error de comunicación.");
        }
    });

    // Cargar alertas al abrir la pantalla
    cargarAlertas();
</script>

</body>
