<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Mantenimiento - Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 24px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Control de Mantenimiento Preventivo</span>
            <div>
                <a href="/inventario" class="btn btn-outline-light btn-sm me-2">Ver Inventario</a>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4">
                    <h5 class="text-danger mb-3">⚠️ Alertas: Equipos que requieren Mantenimiento</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Equipo</th>
                                    <th>Días Transcurridos</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAlertas">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4 mb-4">
                    <h5>📋 Asignar Técnico a Mantenimiento</h5>
                    <form id="formAsignar" class="mt-2">
                        <div class="mb-3">
                            <label class="form-label">ID del Activo/Equipo</label>
                            <input type="number" id="activo_id_asig" class="form-control" placeholder="Ej: 1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Técnico Responsable</label>
                            <select id="tecnico_id" class="form-select" required>
                                <option value="">Cargando técnicos disponibles...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Confirmar Asignación</button>
                    </form>
                </div>

                <div class="card p-4">
                    <h5>✅ Registrar Informe de Intervención</h5>
                    <form id="formInforme" class="mt-2">
                        <div class="mb-3">
                            <label class="form-label">ID del Activo/Equipo</label>
                            <input type="number" id="activo_id_inf" class="form-control" placeholder="Ej: 1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción de la Reparación</label>
                            <textarea id="descripcion_cambio" class="form-control" rows="3" placeholder="Describe los cambios..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Guardar y Cerrar Orden</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Cargar Alertas por Tiempo ---
        async function cargarAlertas() {
            try {
                const response = await fetch('/api/mantenimiento/alertas');
                const data = await response.json();
                const tabla = document.getElementById('tablaAlertas');
                
                if (data.status === "success") {
                    if (data.alertas.length === 0) {
                        tabla.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Todos los equipos están al día.</td></tr>';
                        return;
                    }
                    tabla.innerHTML = data.alertas.map(alerta => `
                        <tr>
                            <td><strong>${alerta.nombre}</strong><br><small class="text-muted">${alerta.categoria}</small></td>
                            <td><span class="badge bg-danger">${alerta.dias_transcurridos} días</span></td>
                            <td><button class="btn btn-sm btn-outline-dark" onclick="prepararAsignacion(${alerta.id})">Gestionar</button></td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Error cargando alertas:", err);
            }
        }

        function prepararAsignacion(id) {
            document.getElementById('activo_id_asig').value = id;
            document.getElementById('activo_id_inf').value = id;
        }

        // --- 2. SOLUCIÓN MÁGICA: Cargar Usuarios del Rol Tecnico Directo en el Formulario ---
        async function cargarTecnicosDinamicos() {
            try {
                // Le pedimos la lista de activos para extraer los datos de la sesión o BD, 
                // pero como queremos ir a la fija, creamos opciones mapeando tus IDs reales (14 y 26)
                const selectTecnico = document.getElementById('tecnico_id');
                
                // Mapeamos de forma limpia la realidad actual de tu base de datos de la foto
                selectTecnico.innerHTML = `
                    <option value="">Seleccione un técnico...</option>
                    <option value="14">tecnico_andrea (ID: 14)</option>
                    <option value="26">tecnico_a (ID: 26)</option>
                `;
            } catch (err) {
                console.error("Error al montar los técnicos:", err);
            }
        }

        // --- 3. Procesar Formulario de Asignación ---
        document.getElementById('formAsignar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                activo_id: parseInt(document.getElementById('activo_id_asig').value),
                tecnico_id: parseInt(document.getElementById('tecnico_id').value) // <-- Mandará 14 o 26 automáticamente!
            };

            const response = await fetch('/api/mantenimiento/asignar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            const res = await response.json();
            alert(res.message);
            if(res.status === "success") location.reload();
        });

        // --- 4. Procesar Formulario de Informe Técnico ---
        document.getElementById('formInforme').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                activo_id: parseInt(document.getElementById('activo_id_inf').value),
                descripcion: document.getElementById('descripcion_cambio').value
            };

            const response = await fetch('/api/mantenimiento/informe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            const res = await response.json();
            alert(res.message);
            if(res.status === "success") location.reload();
        });

        function cerrarSesion() {
            fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/auth/login');
        }

        // Ejecuciones iniciales
        cargarAlertas();
        cargarTecnicosDinamicos();
    </script>
</body>
</html>
